<div class="login-container">
  <div class="login-box">
    <h2>Sign Up</h2>

    <form (ngSubmit)="onSignup()" #signupForm="ngForm">

      <div class="form-group">
        <label>Email</label>
        <input
          type="email"
          class="form-control"
          [(ngModel)]="email"
          name="email"
          placeholder="Email"
          required
        />
      </div>

      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          class="form-control"
          [(ngModel)]="password"
          name="password"
          placeholder="Password"
          required
        />
      </div>

      <div class="alert alert-danger" *ngIf="errorMessage">
        {{ errorMessage }}
      </div>

      <button
        type="submit"
        class="btn btn-primary"
        [disabled]="loading || signupForm.invalid"
      >
        {{ loading ? 'Signing up...' : 'Create Account' }}
      </button>

      <p class="signup-link">
        Already have an account?
        <a (click)="goToLogin()">Login</a>
      </p>

    </form>
  </div>
</div>
